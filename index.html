<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GORILLA DRAW</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --blood: #c0392b;
  --gold: #f0c040;
  --bone: #f5f0e8;
  --dark: #0a0a08;
  --shadow: rgba(0,0,0,0.85);
}

html,body{
  height:100%;
  background:var(--dark);
  color:var(--bone);
  font-family:'Barlow Condensed',sans-serif;
  overflow:hidden;
}

/* ── BG ── */
#bg{
  position:fixed;inset:0;z-index:0;
  background-image:var(--gorilla-img);
  background-size:cover;
  background-position:center 20%;
  filter:brightness(.38) saturate(.6) contrast(1.2);
  transform:scale(1.04);
  transition:filter 0.4s;
}
#bg.pumped{filter:brightness(.55) saturate(1) contrast(1.3);}

#vignette{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.92) 100%);
  pointer-events:none;
}

#scanlines{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0px,rgba(0,0,0,.06) 1px,transparent 1px,transparent 3px);
}

/* ── LAYOUT ── */
#app{
  position:relative;z-index:10;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 16px 0;
  overflow:hidden;
  transition:opacity 0.3s;
}

/* ── HEADER ── */
#header{
  padding:18px 0 10px;
  text-align:center;
  flex-shrink:0;
}
#title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,5vw,52px);
  letter-spacing:.2em;
  color:var(--bone);
  text-shadow:0 0 40px rgba(240,192,64,.5), 2px 2px 0 var(--dark);
  line-height:1;
}
#subtitle{
  font-size:11px;letter-spacing:.35em;color:rgba(245,240,232,.45);margin-top:4px;text-transform:uppercase;
}

/* ── NUMBER GRID ── */
#grid-section{flex-shrink:0;width:100%;max-width:620px;margin-top:8px;}
#grid-label{font-size:10px;letter-spacing:.3em;color:rgba(245,240,232,.4);text-transform:uppercase;margin-bottom:8px;text-align:center;}
#grid{
  display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
}
.num-btn{
  width:36px;height:36px;border-radius:6px;border:1.5px solid rgba(245,240,232,.18);
  background:rgba(10,10,8,.55);backdrop-filter:blur(8px);
  color:rgba(245,240,232,.75);font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;transition:all .14s;display:flex;align-items:center;justify-content:center;
}
.num-btn:hover{background:rgba(240,192,64,.18);border-color:var(--gold);color:var(--gold);}
.num-btn.selected{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:900;}
.num-btn.drawn{background:rgba(192,57,43,.35);border-color:var(--blood);color:rgba(245,240,232,.45);cursor:default;}
.num-btn.drawn.selected{background:rgba(192,57,43,.35);}

/* ── DRUM ── */
#drum-wrap{
  flex-shrink:0;
  margin-top:10px;
  position:relative;
  width:clamp(180px,32vw,260px);
  height:clamp(180px,32vw,260px);
}
#drum-ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:2px solid rgba(240,192,64,.25);
  box-shadow:0 0 40px rgba(240,192,64,.08);
  transition:box-shadow .3s, border-color .3s;
}
#drum-ring.active{
  border-color:rgba(240,192,64,.8);
  box-shadow:0 0 60px rgba(240,192,64,.4),0 0 120px rgba(240,192,64,.15);
  animation:ring-pulse .18s ease-in-out infinite alternate;
}
@keyframes ring-pulse{from{box-shadow:0 0 40px rgba(240,192,64,.3)}to{box-shadow:0 0 80px rgba(240,192,64,.6),0 0 140px rgba(240,192,64,.2)}}
#drum{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 38% 35%, rgba(60,55,40,.95) 0%, rgba(10,10,8,.98) 70%);
  border:2px solid rgba(240,192,64,.2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  box-shadow:inset 0 4px 20px rgba(0,0,0,.7), 0 8px 32px rgba(0,0,0,.6);
}
#drum-number{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(72px,14vw,110px);
  line-height:1;
  color:var(--bone);
  text-shadow:0 0 30px rgba(240,192,64,.6);
  transition:color .1s;
  position:relative;z-index:2;
  letter-spacing:-.02em;
}
#drum-number.ready-text{font-size:28px;letter-spacing:.2em;opacity:.5;font-family:'Barlow Condensed',sans-serif;font-weight:300;}
#drum-number.rolling{
  color:var(--gold);
  animation:roll-shake .06s linear infinite;
}
@keyframes roll-shake{
  0%{transform:translateY(0) scale(1);}
  25%{transform:translateY(-4px) scale(1.05);}
  50%{transform:translateY(2px) scale(.97);}
  75%{transform:translateY(-2px) scale(1.03);}
  100%{transform:translateY(0) scale(1);}
}
#drum-number.result{
  animation:result-pop .5s cubic-bezier(.17,.67,.3,1.4);
  color:var(--gold);
  text-shadow:0 0 60px var(--gold),0 0 120px rgba(240,192,64,.4);
}
@keyframes result-pop{
  0%{transform:scale(0.3) rotate(-10deg);opacity:0;}
  60%{transform:scale(1.18) rotate(2deg);}
  80%{transform:scale(.95) rotate(-1deg);}
  100%{transform:scale(1) rotate(0);}
}

/* particles */
.particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:particle-fly var(--dur,0.8s) ease-out forwards;
}
@keyframes particle-fly{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}

/* ── CONTROLS ── */
#controls{
  flex-shrink:0;
  display:flex;gap:12px;margin-top:14px;align-items:center;
}
#btn-draw{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.15em;
  padding:12px 40px;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#f0c040,#e08020);
  color:var(--dark);
  box-shadow:0 4px 20px rgba(240,192,64,.4);
  transition:all .14s;
  position:relative;overflow:hidden;
}
#btn-draw::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);border-radius:8px;}
#btn-draw:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(240,192,64,.55);}
#btn-draw:active{transform:scale(.97);}
#btn-draw:disabled{opacity:.35;cursor:not-allowed;transform:none;}
#btn-reset{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.12em;
  padding:11px 22px;border-radius:8px;cursor:pointer;
  background:rgba(245,240,232,.07);border:1.5px solid rgba(245,240,232,.25);
  color:rgba(245,240,232,.75);
  transition:all .14s;display:flex;align-items:center;gap:7px;
}
#btn-reset:hover{background:rgba(245,240,232,.13);color:var(--bone);}
#btn-reset svg{width:14px;height:14px;flex-shrink:0;}

/* ── COUNTER ── */
#counter{
  font-size:11px;letter-spacing:.25em;color:rgba(245,240,232,.38);
  margin-top:8px;flex-shrink:0;
}

/* ── HISTORY ── */
#history-wrap{
  flex:1;min-height:0;
  width:100%;max-width:620px;
  margin-top:10px;
  overflow:hidden;
  display:flex;flex-direction:column;
}
#history-head{
  display:flex;align-items:center;gap:10px;
  font-size:10px;letter-spacing:.3em;color:rgba(245,240,232,.35);
  text-transform:uppercase;margin-bottom:8px;flex-shrink:0;
}
#history-count{
  background:rgba(240,192,64,.18);border:1px solid rgba(240,192,64,.3);
  color:var(--gold);font-size:9px;padding:1px 7px;border-radius:10px;
  font-family:'Barlow Condensed',monospace;font-weight:600;letter-spacing:.08em;
}
#history-list{
  flex:1;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;
  padding-bottom:12px;
}
#history-list::-webkit-scrollbar{width:3px;}
#history-list::-webkit-scrollbar-thumb{background:rgba(245,240,232,.15);border-radius:2px;}
.hi{
  width:38px;height:38px;border-radius:7px;
  background:rgba(192,57,43,.22);border:1.5px solid rgba(192,57,43,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(245,240,232,.85);
  letter-spacing:.04em;
  animation:hi-in .25s cubic-bezier(.17,.67,.3,1.3);
  flex-shrink:0;
}
@keyframes hi-in{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
#no-history{font-size:12px;letter-spacing:.18em;color:rgba(245,240,232,.2);text-transform:uppercase;margin:auto;}

/* ── FLASH OVERLAY ── */
#flash{
  position:fixed;inset:0;z-index:100;
  background:rgba(240,192,64,.18);
  pointer-events:none;opacity:0;
  transition:opacity .05s;
}
#flash.show{opacity:1;}

/* ── COUNTDOWN ── */
#countdown-overlay{
  position:fixed;inset:0;z-index:50;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.0);
  pointer-events:none;
}
#countdown-overlay.active{display:flex;}
#countdown-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(120px,22vw,200px);
  color:rgba(240,192,64,.9);
  text-shadow:0 0 80px rgba(240,192,64,.6);
  animation:cd-anim .85s cubic-bezier(.17,.67,.3,1.4) forwards;
  letter-spacing:-.04em;
}
@keyframes cd-anim{
  0%{transform:scale(1.8);opacity:0;}
  30%{opacity:1;}
  80%{transform:scale(1);opacity:1;}
  100%{transform:scale(.8);opacity:0;}
}

/* ── RESULT SCREEN ── */
#result-screen {
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s;
}
#result-screen.show {
  opacity:1;pointer-events:all;
}
/* gorilla bg goes full brightness */
#result-screen.show ~ #bg, #bg.result-mode {
  filter:brightness(.85) saturate(1.1) contrast(1.15) !important;
}
#result-num-big {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(180px,32vw,320px);
  line-height:.9;
  color:var(--gold);
  text-shadow:
    0 0 60px rgba(240,192,64,.9),
    0 0 120px rgba(240,192,64,.5),
    0 8px 0 rgba(0,0,0,.7);
  letter-spacing:-.02em;
  animation:big-num-in .6s cubic-bezier(.17,.67,.3,1.4) both;
}
@keyframes big-num-in {
  0%{transform:scale(.2) rotate(-15deg);opacity:0;}
  60%{transform:scale(1.12) rotate(2deg);}
  80%{transform:scale(.97) rotate(-1deg);}
  100%{transform:scale(1) rotate(0);}
}
#result-label {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(16px,3vw,28px);
  letter-spacing:.3em;
  color:rgba(245,240,232,.7);
  text-transform:uppercase;
  margin-top:8px;
  animation:fadeup .5s .3s ease both;
}
#result-history-strip {
  margin-top:24px;
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  max-width:min(90vw, 600px);
  animation:fadeup .5s .5s ease both;
}
@keyframes fadeup {
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:none;}
}
.rhi {
  width:44px;height:44px;border-radius:8px;
  background:rgba(192,57,43,.35);border:2px solid rgba(192,57,43,.6);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:rgba(245,240,232,.9);
}
.rhi.latest {
  background:rgba(240,192,64,.3);border-color:var(--gold);color:var(--gold);
  font-size:24px;
  box-shadow:0 0 20px rgba(240,192,64,.4);
}
#result-continue-btn {
  margin-top:36px;
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.15em;
  padding:13px 44px;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#f0c040,#e08020);
  color:var(--dark);
  box-shadow:0 4px 20px rgba(240,192,64,.4);
  transition:all .14s;
  animation:fadeup .5s .7s ease both;
}
#result-continue-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(240,192,64,.6);}
#result-continue-btn:active{transform:scale(.97);}

</style>
</head>
<body>

<div id="bg"></div>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="flash"></div>

<div id="countdown-overlay">
  <div id="countdown-num"></div>
</div>

<div id="app">
  <div id="header">
    <div id="title">GORILLA DRAW</div>
    <div id="subtitle">運命のナンバーを引き当てろ</div>
  </div>

  <div id="grid-section">
    <div id="grid-label">母数を選択</div>
    <div id="grid"></div>
  </div>

  <div id="drum-wrap">
    <div id="drum-ring"></div>
    <div id="drum">
      <div id="drum-number" class="ready-text">READY</div>
    </div>
  </div>

  <div id="controls">
    <button id="btn-draw" onclick="startDraw()">続けて抽選</button>
    <button id="btn-reset" onclick="resetDraw()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8a6 6 0 1 1 1.5 4"/>
        <path d="M2 12V8h4"/>
      </svg>
      最初から
    </button>
  </div>

  <div id="counter">残り — / —</div>

  <div id="history-wrap">
    <div id="history-head">
      <span>History</span>
      <span id="history-count">0</span>
    </div>
    <div id="history-list">
      <div id="no-history">No numbers drawn yet</div>
    </div>
  </div>
</div>

// ── STATE ──────────────────────────────────────────────────
let total = 35;
let pool = [];
let history = [];
let isRolling = false;

// ── INIT ───────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 35; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn' + (i === total ? ' selected' : '');
    btn.textContent = i;
    btn.dataset.n = i;
    btn.addEventListener('click', () => selectTotal(i));
    grid.appendChild(btn);
  }
}

function selectTotal(n) {
  if (isRolling) return;
  total = n;
  document.querySelectorAll('.num-btn').forEach(b => {
    b.classList.toggle('selected', +b.dataset.n === n);
  });
  reset();
}

function reset() {
  pool = Array.from({length: total}, (_, i) => i + 1);
  history = [];
  updateUI();
  setDrumDisplay('READY', true);
  document.getElementById('drum-ring').classList.remove('active');
  document.getElementById('bg').classList.remove('pumped');
}

function resetDraw() {
  if (isRolling) return;
  reset();
}

// ── DRAW ───────────────────────────────────────────────────
async function startDraw() {
  if (isRolling || pool.length === 0) return;
  isRolling = true;
  document.getElementById('btn-draw').disabled = true;

  const ring = document.getElementById('drum-ring');
  const bg = document.getElementById('bg');
  ring.classList.add('active');
  bg.classList.add('pumped');

  // roll animation
  await rollAnimation();

  // pick result
  const idx = Math.floor(Math.random() * pool.length);
  const result = pool.splice(idx, 1)[0];
  history.push(result);

  // show result
  await showResult(result);

  // update grid
  updateDrawnGrid();
  updateUI();

  ring.classList.remove('active');
  bg.classList.remove('pumped');
  isRolling = false;
  document.getElementById('btn-draw').disabled = pool.length === 0;
}

function rollAnimation() {
  return new Promise(resolve => {
    const el = document.getElementById('drum-number');
    el.classList.remove('ready-text', 'result');
    el.classList.add('rolling');

    const totalFrames = 38;
    let frame = 0;
    const tick = () => {
      if (frame >= totalFrames) { resolve(); return; }
      // speed up then slow down
      const t = frame / totalFrames;
      const interval = t < 0.5 ? 30 : 30 + (t - 0.5) * 160;
      el.textContent = String(Math.floor(Math.random() * total) + 1).padStart(2, ' ');
      frame++;
      setTimeout(tick, interval);
      // flash effect every few frames
      if (frame % 5 === 0) flashScreen();
    };
    tick();
  });
}

function showResult(n) {
  return new Promise(resolve => {
    const el = document.getElementById('drum-number');
    el.classList.remove('rolling', 'ready-text');
    el.textContent = n;
    el.classList.add('result');
    flashScreen();
    spawnParticles();
    // After a short moment, show full-screen result
    setTimeout(() => {
      openResultScreen(n);
      resolve();
    }, 500);
  });
}

function openResultScreen(n) {
  // big number
  const big = document.getElementById('result-num-big');
  big.textContent = n;
  // rebuild animation
  big.classList.remove('big-num-in');
  void big.offsetWidth;

  // history strip
  const strip = document.getElementById('result-history-strip');
  strip.innerHTML = '';
  [...history].reverse().forEach((num, i) => {
    const d = document.createElement('div');
    d.className = 'rhi' + (i === 0 ? ' latest' : '');
    d.textContent = num;
    strip.appendChild(d);
  });

  // continue button text
  const btn = document.getElementById('result-continue-btn');
  btn.textContent = pool.length === 0 ? '最初から' : '続けて抽選';
  btn.disabled = false;

  // show bg full bright
  document.getElementById('bg').classList.add('result-mode');

  // hide app content
  document.getElementById('app').style.opacity = '0';

  // show screen
  const screen = document.getElementById('result-screen');
  screen.classList.add('show');
}

function closeResultScreen() {
  const screen = document.getElementById('result-screen');
  screen.classList.remove('show');
  document.getElementById('app').style.opacity = '1';
  document.getElementById('bg').classList.remove('result-mode');

  // Reset drum display
  const drumEl = document.getElementById('drum-number');
  drumEl.className = '';
  // keep the displayed result number visible until next draw

  // Reset rolling state so next draw works
  isRolling = false;
  document.getElementById('btn-draw').disabled = pool.length === 0;
  document.getElementById('drum-ring').classList.remove('active');
  document.getElementById('bg').classList.remove('pumped');

  if (pool.length === 0) {
    resetDraw();
  }
}

function flashScreen() {
  const f = document.getElementById('flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 80);
}

function spawnParticles() {
  const wrap = document.getElementById('drum-wrap');
  const colors = ['#f0c040','#e08020','#fff8e0','#c0392b','#fff'];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 7;
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 100;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:50%;top:50%;
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      --dur:${0.5+Math.random()*0.5}s;
      margin:-${size/2}px;
    `;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// ── UI HELPERS ─────────────────────────────────────────────
function setDrumDisplay(text, isLabel) {
  const el = document.getElementById('drum-number');
  el.className = isLabel ? 'ready-text' : '';
  el.textContent = text;
}

function updateDrawnGrid() {
  const drawn = new Set(history);
  document.querySelectorAll('.num-btn').forEach(b => {
    const n = +b.dataset.n;
    if (n <= total) {
      b.classList.toggle('drawn', drawn.has(n));
    }
  });
}

function updateUI() {
  const remaining = pool.length;
  document.getElementById('counter').textContent = `残り ${remaining} / ${total}`;
  document.getElementById('history-count').textContent = history.length;

  const list = document.getElementById('history-list');
  const noH = document.getElementById('no-history');

  if (history.length === 0) {
    list.innerHTML = '';
    list.appendChild(noH);
  } else {
    if (noH.parentNode) noH.remove();
    // rebuild from scratch to keep order
    list.innerHTML = '';
    [...history].reverse().forEach(n => {
      const hi = document.createElement('div');
      hi.className = 'hi';
      hi.textContent = n;
      list.appendChild(hi);
    });
  }

  // drawn grid sync
  updateDrawnGrid();
  document.getElementById('btn-draw').disabled = pool.length === 0 || isRolling;
}
// ── START ──────────────────────────────────────────────────
buildGrid();
reset();
</script>

<div id="result-screen">
  <div id="result-num-big"></div>
  <div id="result-label">DRAW RESULT</div>
  <div id="result-history-strip"></div>
  <button id="result-continue-btn" onclick="closeResultScreen()">続けて抽選</button>
</div>

</body>
</html>
